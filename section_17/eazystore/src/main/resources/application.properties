spring.application.name=eazystore
#debug=true
#server.port=8081

logging.pattern.console=%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %msg%n

#define logging error level, error is lowermost level with less information
logging.level.com.eazybytes.eazystore=${LOG_LEVEL:INFO}

#define result log file path
logging.file.name=${LOG_FILE_NAME:/Users/mpriharsanto/Downloads/Belajar_Fullstack_React_Springboot/eazystore-log/app.log}

#define result log file in json format
logging.pattern.file={"timestamp":"%d{yyyy-MM-dd HH:mm:ss}","level":"%p","logger":"%c","message":"%m"}

#spring.h2.console.enabled=true

#mem means save the database inside ram, so if db/browser is restarted, the updated data is gone
#spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.url=jdbc:mysql://${DATABASE_HOST:localhost}:${DATABASE_PORT:3306}/${DATABASE_NAME:eazystore}

#for office mysql via brew
spring.datasource.username=${DATABASE_USERNAME:rajabun}

#for personal mysql via docker
#spring.datasource.username=${DATABASE_USERNAME:root}

spring.datasource.password=${DATABASE_PASSWORD:root}

#only use this statements to true in development phase
spring.jpa.show-sql=${JPA_SHOW_URL:true}

#to make sql logs properly formatted
spring.jpa.properties.hibernate.format_sql=${HIBERNATE_FORMAT_URL:true}

#to know dependent components health via actuator (spring tools added via maven pom.xml)
management.endpoint.health.show-details=always

#to change the actuator url path from http://localhost:8080/actuator
management.endpoints.web.base-path=/eazystore/actuator

#to add additional information on actuator
#* (asterisk) means that we giving instruction to actuator to expose all Rest API and the data that it's capable of exposing
#to only include some information, just mention the components that we want to monitor (example: health,beans)
management.endpoints.web.exposure.include=*

#to exclude the components so it's not showing on actuator
#management.endpoints.web.exposure.exclude=beans,health

#to expose sanitized/censored value on some components
management.endpoint.configprops.show-values=always
management.endpoint.env.show-values=always

#to enable environment info on actuator
management.info.env.enabled=true
info.app.name=${spring.application.name}
info.app.description=Backend Project for Eazy Store E-commerce application
info.app.version=1.0.0
info.app.contact.email=jabun@jabunstudio.com

